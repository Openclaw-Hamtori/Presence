name: presence-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm install

      - name: Check mobile sync guardrails
        run: npm run check:mobile-sync

      - name: Verify verifier
        run: npm run test -w presence-verifier

      - name: Verify sdk
        run: npm run test -w presence-sdk

      - name: Type-check mobile
        run: npm run type-check -w presence-mobile

      - name: Type-check test app
        run: npm run type-check -w presence-test-app
