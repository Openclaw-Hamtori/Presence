name: presence-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm install

      - name: Run Presence Phase 1 baseline guardrail
        run: npm run ci:phase1

      - name: Build presence-sdk dist for server checks
        run: npm run build -w presence-sdk

      - name: Run release-readiness hardening checks
        run: npm run check:server-release-readiness
        env:
          PRESENCE_SMOKE_PUBLIC_BASE_URL: http://127.0.0.1:18920
          PRESENCE_SMOKE_LOCAL: 1
          PRESENCE_SMOKE_PENDING_PROOF_PROBE: 0
          PRESENCE_SMOKE_ROUTE_BASE: ""
          PRESENCE_SMOKE_SERVICE_DOMAIN: presence.example
          PRESENCE_SMOKE_HOST: 127.0.0.1
          PRESENCE_SMOKE_PORT: 18920
